<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="logo-icon-svg" style="width: 100%; height: 100%; display: block;">
  <defs>
    <linearGradient id="docGradientIconBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730a3" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="docGradientIconFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="waveGradient1Icon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
    <linearGradient id="waveGradient2Icon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052d4" />
      <stop offset="50%" stop-color="#4364f7" />
      <stop offset="100%" stop-color="#6fb1fc" />
    </linearGradient>
    <linearGradient id="waveGradient3Icon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="logoShadowIcon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#091e36" flood-opacity="0.15" />
    </filter>
  </defs>
  <g transform="translate(2, 2)" filter="url(#logoShadowIcon)">
    <!-- Back Document -->
    <rect x="25" y="10" width="36" height="46" rx="4" fill="#ffffff" stroke="url(#docGradientIconBack)" stroke-width="2.5" />
    <line x1="32" y1="20" x2="54" y2="20" stroke="url(#docGradientIconBack)" stroke-width="2" stroke-linecap="round" />
    <line x1="32" y1="26" x2="48" y2="26" stroke="url(#docGradientIconBack)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Front Document (Larger, more prominent) -->
    <rect x="42" y="18" width="40" height="52" rx="4" fill="#ffffff" stroke="url(#docGradientIconFront)" stroke-width="3" />
    
    <!-- Document Lines -->
    <line x1="49" y1="30" x2="75" y2="30" stroke="url(#docGradientIconFront)" stroke-width="2.5" stroke-linecap="round" />
    <line x1="49" y1="38" x2="68" y2="38" stroke="url(#docGradientIconFront)" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Small Data Visualization (Pie Chart) -->
    <circle cx="56" cy="52" r="6" fill="none" stroke="url(#docGradientIconFront)" stroke-width="2" />
    <path d="M 56,52 L 56,46 A 6,6 0 0,1 62,52 Z" fill="url(#docGradientIconFront)" />
    
    <!-- Checkmark Badge -->
    <circle cx="72" cy="60" r="7" fill="url(#waveGradient1Icon)" />
    <path d="M 69,60 L 71,62 L 75,57" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

    <!-- 3 Layered Waves -->
    <path d="M 0,60 C 20,40 45,75 80,45 C 84,40 85,32 85,32 C 85,32 86,46 81,56 C 71,72 45,80 25,80 C 10,80 0,68 0,60 Z" fill="url(#waveGradient3Icon)" opacity="0.8" />
    <path d="M 3,63 C 23,43 48,78 83,48 C 87,43 88,35 88,35 C 88,35 89,49 84,59 C 74,75 48,83 28,83 C 13,83 3,71 3,63 Z" fill="url(#waveGradient2Icon)" opacity="0.9" />
    <path d="M 6,66 C 26,46 51,81 86,51 C 90,46 91,38 91,38 C 91,38 92,52 87,62 C 77,78 51,86 31,86 C 16,86 6,74 6,66 Z" fill="url(#waveGradient1Icon)" />
  </g>
</svg>